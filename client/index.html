<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>MTN - Human Capital - AI-Powered HR Management Platform</title>
    <meta name="description" content="Transform your HR operations with MTN - Human Capital's AI-powered platform. Automate recruitment, integrity checks, onboarding, and employee management for the South African market." />

    <!-- Open Graph / Facebook -->

    <!-- Twitter -->

    <!-- Grid Layout CSS -->
    <link rel="stylesheet" href="/node_modules/react-grid-layout/css/styles.css" />
    <link rel="stylesheet" href="/node_modules/react-resizable/css/styles.css" />
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'system';
        var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
